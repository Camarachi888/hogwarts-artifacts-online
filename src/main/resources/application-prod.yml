spring:
  cloud:
    azure:
      keyvault:
        secret:
          property-sources:
            endpoint: #{AZURE_KEY_VAULT_ENDPOINT)
  datasource:
    url: ${datasource-url}
    username: ${datasource-username}
    password: ${datasource-password}
  jpa:
    hibernate:
      ddl-auto: none #turn off the ddl auto generation
